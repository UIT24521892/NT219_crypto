# Citizen Services Portal — Nginx site config.
#
# Phục vụ frontend (Vite build) + reverse-proxy API tới uvicorn.
# Same-origin → frontend gọi /auth, /documents, ... không cần CORS.
#
# Cài đặt:
#   sudo cp deploy/nginx-citizen-portal.conf /etc/nginx/sites-available/citizen-portal
#   sudo ln -s /etc/nginx/sites-available/citizen-portal /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t          # test config
#   sudo systemctl reload nginx

# ─────────────────────────────────────────────────────────────
# HTTP (port 80) — redirect sang HTTPS
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Cho phép Let's Encrypt ACME challenge (nếu dùng certbot sau này)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Mọi request khác → ép sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS (port 443)
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # TLS cert — self-signed (chạy tls-selfsigned.sh) hoặc Let's Encrypt
    ssl_certificate     /etc/ssl/citizen-portal/fullchain.pem;
    ssl_certificate_key /etc/ssl/citizen-portal/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Cho upload PDF tới 10 MB (khớp MAX_UPLOAD_SIZE_MB backend)
    client_max_body_size 12M;

    # ── Frontend static files (Vite build output) ──
    root /var/www/citizen-portal;
    index index.html;

    # ── API routes → reverse proxy tới uvicorn ──
    # Khớp các prefix backend expose. Thêm prefix mới vào đây nếu mở rộng API.
    location ~ ^/(auth|documents|verify|audit|ping|docs|redoc|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback ──
    # react-router dùng client-side routing → mọi path không phải file thật
    # đều trả index.html để app tự route (vd /verify?d=..., /documents/:id).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
